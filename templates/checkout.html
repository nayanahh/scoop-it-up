{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    :root { --cream-light:#fffdf9; --cocoa-dark:#3d2b1f; --berry-accent:#d44d5c; --gold:#FFD700; --border-soft:rgba(61,43,31,0.08); }
    .checkout-wrapper{max-width:800px;margin:60px auto;padding:0 20px;font-family:'Quicksand',sans-serif}
    .checkout-container{background:white;border-radius:40px;padding:40px;box-shadow:0 40px 100px rgba(61,43,31,0.05)}
    .payment-methods{margin-top:20px}
    .payment-option{display:flex;align-items:center;padding:12px;border:1px solid var(--border-soft);border-radius:14px;margin-bottom:10px;cursor:pointer}
    .payment-option input{margin-right:12px}

    #payment-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;flex-direction:column;color:white;z-index:9999}
    .coin{width:100px;height:100px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:48px;color:#B8860B;border:5px solid #DAA520;box-shadow:0 0 30px rgba(255,215,0,0.6);position:relative}
    .coin::before{content:'';position:absolute;inset:0;border-radius:50%;animation:spin 0.6s linear infinite}
    @keyframes spin{from{transform:rotateZ(0)}to{transform:rotateZ(360deg)}}
    @keyframes fly{0%{transform:translateY(200px) scale(0.1);opacity:0}15%{opacity:1;transform:translateY(0) scale(1)}85%{transform:translateY(-500px) scale(1.3)}100%{transform:translateY(-600px) scale(1.6);opacity:0}}
    .coin.fly{animation:fly 2.5s ease-out forwards}
    .payment-loader{width:40px;height:40px;border-radius:50%;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--gold);animation:spin 1s linear infinite;margin-top:20px}
    #status-msg{margin-top:18px;font-family:'Fredoka One';font-size:1.1rem}
    .success-popup{display:none;text-align:center}
    .hidden-inputs{display:none}
    .btn-place-order{background:var(--berry-accent);color:white;padding:14px 28px;border-radius:50px;border:none}
    .form-group{margin-bottom:16px}
    .form-label{font-weight:600}
    .form-control{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border-soft)}
</style>

<div class="checkout-wrapper">
    <div class="checkout-container">
        <h2 style="font-family:'Fredoka One';">Checkout</h2>
        <form id="checkout-form" method="post" class="mt-3">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input class="form-control" name="name" value="{{ user.get_full_name }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input class="form-control" name="phone" required>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <textarea class="form-control" name="address" rows="2" required></textarea>
            </div>

            <h4>Payment Method</h4>
            <div class="payment-methods">
                <label class="payment-option"><input type="radio" name="payment_method" value="upi" checked> <span style="flex:1">UPI / Card (Razorpay)</span> <span>⚡</span></label>
                <label class="payment-option"><input type="radio" name="payment_method" value="cod"> <span style="flex:1">Cash on Delivery</span> <span>🚚</span></label>
            </div>

            <div class="hidden-inputs">
                <input type="hidden" name="rzp_payment_id" id="rzp_payment_id">
                <input type="hidden" name="rzp_order_id" id="rzp_order_id">
                <input type="hidden" name="rzp_signature" id="rzp_signature">
            </div>

            <button type="button" id="pay-btn" class="btn-place-order" onclick="startPayment()">Complete Purchase</button>
        </form>
    </div>
</div>

<div id="payment-overlay">
    <div id="coin-element" class="coin">₹</div>
    <div id="loader-element" class="payment-loader"></div>
    <div id="status-msg">Preparing payment...</div>
    <div id="success-screen" class="success-popup">
        <h2>✅</h2>
        <h3 id="success-text" style="font-family:'Fredoka One'">Order Placed!</h3>
        <p>Redirecting...</p>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
async function startPayment(){
    const form = document.getElementById('checkout-form');
    if(!form.checkValidity()){ form.reportValidity(); return; }
    const method = document.querySelector('input[name="payment_method"]:checked').value;
    const overlay = document.getElementById('payment-overlay');
    const coin = document.getElementById('coin-element');
    const status = document.getElementById('status-msg');
    const loader = document.getElementById('loader-element');
    const successScreen = document.getElementById('success-screen');

    if(method === 'upi'){
        // Call backend to create razorpay order
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        try{
            const res = await fetch('{% url "create_razorpay_order" %}', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrftoken, 'Accept':'application/json' },
            });
            const data = await res.json();
            if(res.ok && data.order_id){
                // Open Razorpay Checkout
                const options = {
                    key: data.key,
                    amount: data.amount,
                    currency: data.currency || 'INR',
                    name: 'Scoop It Up',
                    description: 'Order Payment',
                    order_id: data.order_id,
                    // Explicitly enable payment methods including UPI
                    method: {
                        upi: true,
                        card: true,
                        netbanking: true,
                        wallet: true,
                        emi: true
                    },
                    prefill: {
                        name: document.querySelector('input[name="name"]').value || '',
                        contact: document.querySelector('input[name="phone"]').value || '',
                    },
                    handler: function(response){
                        // Payment successful - fill hidden fields and submit real form
                        document.getElementById('rzp_payment_id').value = response.razorpay_payment_id;
                        document.getElementById('rzp_order_id').value = response.razorpay_order_id;
                        document.getElementById('rzp_signature').value = response.razorpay_signature;
                        overlay.style.display = 'flex';
                        coin.classList.add('fly');
                        status.innerText = 'Payment successful. Finalizing order...';
                        loader.style.display = 'none';
                        successScreen.style.display = 'block';
                        setTimeout(()=> form.submit(), 1200);
                    },
                    modal: { escape: false }
                };
                console.log('Razorpay order response:', data);
                console.log('Razorpay options:', options);
                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function(response){
                    console.error('Razorpay payment failed:', response);
                    alert('Payment failed: ' + (response.error && response.error.description ? response.error.description : 'Unknown error'));
                });
                rzp.open();
            } else {
                alert('Unable to create payment. Try again.');
            }
        } catch(err){
            console.error(err); alert('Payment initialization failed');
        }
    } else {
        // COD: show overlay then submit
        overlay.style.display = 'flex';
        coin.style.display = 'none';
        status.innerText = 'Confirming COD order...';
        setTimeout(()=>{ successScreen.style.display='block'; loader.style.display='none'; setTimeout(()=> form.submit(), 900); }, 900);
    }
}
</script>

{% endblock %}
