{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    :root {
        --cocoa-dark: #3D2B1F;
        --berry-accent: #D44D5C;
        --soft-gold: #C5A059;
        --input-bg: #F9F9F9;
        --smooth-curve: cubic-bezier(0.23, 1, 0.32, 1);
    }

    .auth-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        background-color: var(--cream-bg);
    }

    /* --- 1. Soft Fade-In Animation --- */
    @keyframes cardEntrance {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .auth-card {
        background: white;
        width: 100%;
        max-width: 500px;
        padding: 60px 50px;
        border-radius: 30px; /* Modern rounded corners */
        box-shadow: 0 30px 70px rgba(61, 43, 31, 0.08);
        text-align: center;
        border: 1px solid rgba(0,0,0,0.02);
        font-family: 'Quicksand', sans-serif;
        animation: cardEntrance 0.8s var(--smooth-curve) forwards;
    }

    .brand-logo-small {
        font-family: 'Fredoka One', cursive;
        font-size: 1rem;
        margin-bottom: 20px;
        color: var(--soft-gold);
        letter-spacing: 3px;
    }

    .auth-card h2 {
        font-family: 'Fredoka One', cursive;
        font-size: 2.5rem;
        color: var(--cocoa-dark);
        margin-bottom: 12px;
        letter-spacing: -1px;
    }

    .auth-card p.subtitle {
        font-size: 0.85rem;
        color: #8E847D;
        margin-bottom: 45px;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.6;
        font-weight: 500;
    }

    /* --- Form Fields with Micro-Interactions --- */
    .form-group {
        margin-bottom: 22px;
        text-align: left;
    }

    .form-group label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--cocoa-dark);
        margin-bottom: 8px;
        display: block;
        padding-left: 5px;
    }

    .premium-input {
        width: 100%;
        padding: 16px 20px;
        border-radius: 12px;
        border: 1px solid #EEE;
        background-color: var(--input-bg);
        font-family: 'Quicksand', sans-serif;
        font-size: 0.95rem;
        color: var(--cocoa-dark);
        transition: all 0.3s var(--smooth-curve);
        outline: none;
    }

    .premium-input:focus {
        background-color: #FFFFFF;
        border-color: var(--berry-accent);
        box-shadow: 0 10px 20px rgba(212, 77, 92, 0.05);
        transform: translateY(-2px);
    }

    /* --- Button with Shine Animation --- */
    .btn-register {
        width: 100%;
        background: var(--cocoa-dark);
        color: white;
        border: none;
        padding: 20px;
        border-radius: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-size: 0.85rem;
        margin-top: 25px;
        cursor: pointer;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden; /* For the shine effect */
    }

    .btn-register:hover {
        background: var(--berry-accent);
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(212, 77, 92, 0.25);
    }

    /* Shine move across button on hover */
    .btn-register::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: 0.6s;
    }
    .btn-register:hover::after {
        left: 100%;
    }

    .auth-footer {
        margin-top: 45px;
        padding-top: 25px;
        border-top: 1px solid #F5F5F5;
        font-size: 0.8rem;
        color: #999;
    }

    .auth-footer a {
        color: var(--berry-accent);
        text-decoration: none;
        font-weight: 700;
        transition: 0.3s;
    }

    .auth-footer a:hover {
        text-decoration: underline;
        text-underline-offset: 4px;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="ice-cream-float" style="font-size: 2.5rem; margin-bottom: 10px;"></div>
        <div class="brand-logo-small text-uppercase">Scoop It Up</div>
        
        <h2>Create Account</h2>
        <p class="subtitle">Join our inner circle for a<br>curated artisan experience</p>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="premium-input" placeholder="Desired username" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="premium-input" placeholder="email@domain.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="premium-input" placeholder="Minimum 8 characters" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="premium-input" placeholder="Verify password" required>
            </div>

            <button type="submit" class="btn-register">Register Account</button>
        </form>

        <div class="auth-footer">
            Already part of the family? <a href="/accounts/login/">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
