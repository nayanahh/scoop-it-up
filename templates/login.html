{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    :root {
        --cocoa-dark: #3D2B1F;
        --berry-accent: #D44D5C;
        --soft-gold: #C5A059;
        --gold-glow: rgba(197, 160, 89, 0.3);
        --input-bg: rgba(255, 255, 255, 0.9);
        --smooth-curve: cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* --- Animations --- */
    @keyframes authFadeIn {
        from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes bgDrift {
        0% { background-position: center; }
        50% { background-position: 52% 48%; }
        100% { background-position: center; }
    }

    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background:
                    url('{{ MEDIA_URL }}images/white.jpg');
        background-size: contain;
        background-position: center;
        background-attachment: fixed;
        animation: bgDrift 50s infinite ease-in-out; /* Slow drifting background */
        overflow: hidden;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        width: 100%;
        max-width: 460px;
        padding: 60px 50px;
        border-radius: 30px; 
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        text-align: center;
        animation: authFadeIn 1.2s var(--smooth-curve);
        position: relative;
    }

    .auth-card:hover {
        transform: translateY(-5px);
        border-color: rgba(197, 160, 89, 0.4);
        transition: 0.5s var(--smooth-curve);
    }

    .brand-logo {
        font-family: 'Fredoka One', cursive;
        font-size: 1.1rem;
        margin-bottom: 25px;
        color: var(--soft-gold);
        letter-spacing: 6px;
        text-shadow: 0 0 15px var(--gold-glow);
        opacity: 0.8;
    }

    .auth-card h2 {
        font-family: 'Fredoka One', cursive;
        font-size: 2.5rem;
        color: #FFFFFF; 
        margin-bottom: 8px;
        letter-spacing: -1px;
    }

    .auth-card p.subtitle {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 40px;
        text-transform: uppercase;
        letter-spacing: 4px;
        font-weight: 700;
    }

    /* --- Staggered Form Animation --- */
    .form-group {
        margin-bottom: 25px;
        text-align: left;
        animation: authFadeIn 0.8s var(--smooth-curve) both;
    }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    .form-group label {
        font-size: 0.6rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--soft-gold);
        margin-bottom: 10px;
        display: block;
        padding-left: 5px;
    }

    .premium-input {
        width: 100%;
        padding: 18px 22px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        font-family: 'Quicksand', sans-serif;
        font-size: 0.95rem;
        color: #FFFFFF;
        transition: all 0.4s;
        outline: none;
    }

    .premium-input:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--soft-gold);
        box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        transform: scale(1.02);
    }

    /* --- Glowing 3D Button --- */
    .btn-auth {
        width: 100%;
        background: linear-gradient(135deg, var(--soft-gold), #8e7037);
        color: #FFFFFF;
        border: none;
        padding: 20px;
        border-radius: 15px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 4px;
        font-size: 0.85rem;
        margin-top: 15px;
        cursor: pointer;
        transition: all 0.4s var(--smooth-curve);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        animation: authFadeIn 0.8s var(--smooth-curve) 0.4s both;
    }

    .btn-auth:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(197, 160, 89, 0.4);
        letter-spacing: 5px; /* Expands slightly on hover */
    }

    .auth-footer {
        margin-top: 40px;
        padding-top: 25px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        animation: authFadeIn 1s var(--smooth-curve) 0.6s both;
    }

    .auth-footer a {
        color: var(--soft-gold);
        text-decoration: none;
        font-weight: 700;
        transition: 0.3s;
    }

    .auth-footer a:hover {
        color: #fff;
        text-shadow: 0 0 10px var(--soft-gold);
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-logo">SCOOP IT UP</div>
        
        <h2>Member Login</h2>
        <p class="subtitle">Artisan Collection Access</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">User Identification</label>
                <input class="premium-input" type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <label for="password">Security Code</label>
                <input class="premium-input" type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth">Authorize Access</button>
        </form>

        <div class="auth-footer">
            <a href="#">Security Reset</a> &nbsp; | &nbsp; New Member? <a href="{% url 'register' %}">Request Account</a>
        </div>
    </div>
</div>
{% endblock %}
